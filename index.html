<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Mini Battle Royale</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
touch-action:none;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:Arial;
}

#controls{
position:absolute;
bottom:20px;
left:20px;
}

#actions{
position:absolute;
bottom:20px;
right:20px;
}

button{
width:70px;
height:70px;
font-size:25px;
border-radius:10px;
border:none;
margin:5px;
background:rgba(255,255,255,0.3);
color:white;
}

</style>

</head>

<body>

<div id="ui">
<div id="hp">HP:100</div>
<div id="storm">Storm:200</div>
</div>

<div id="controls">

<div>
<button id="up">⬆️</button>
</div>

<div>
<button id="left">⬅️</button>
<button id="down">⬇️</button>
<button id="right">➡️</button>
</div>

</div>

<div id="actions">

<button id="jump">🦘</button>
<button id="shoot">🔫</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

////////////////////////////////////////////////////////
// SCENA
////////////////////////////////////////////////////////

const scene = new THREE.Scene()

scene.background = new THREE.Color(0x87ceeb)

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

////////////////////////////////////////////////////////
// LUCI
////////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(0xffffff,0.6)

scene.add(ambient)

const sun = new THREE.DirectionalLight(0xffffff,1)

sun.position.set(50,100,50)

scene.add(sun)

////////////////////////////////////////////////////////
// TERRENO
////////////////////////////////////////////////////////

const ground = new THREE.Mesh(

new THREE.PlaneGeometry(500,500),

new THREE.MeshLambertMaterial({color:0x228822})

)

ground.rotation.x=-Math.PI/2

scene.add(ground)

////////////////////////////////////////////////////////
// PLAYER
////////////////////////////////////////////////////////

const player = new THREE.Mesh(

new THREE.BoxGeometry(2,4,2),

new THREE.MeshLambertMaterial({color:0x00aaff})

)

player.position.y=2

scene.add(player)

camera.position.set(0,6,10)

////////////////////////////////////////////////////////
// SALTO
////////////////////////////////////////////////////////

let velocityY=0
let onGround=true

function jump(){

if(onGround){

velocityY=0.25
onGround=false

}

}

////////////////////////////////////////////////////////
// MOVIMENTO
////////////////////////////////////////////////////////

const move={up:false,down:false,left:false,right:false}

function bindButton(id,dir){

const b=document.getElementById(id)

b.addEventListener("pointerdown",()=>move[dir]=true)

b.addEventListener("pointerup",()=>move[dir]=false)

b.addEventListener("pointercancel",()=>move[dir]=false)

b.addEventListener("pointerleave",()=>move[dir]=false)

}

bindButton("up","up")
bindButton("down","down")
bindButton("left","left")
bindButton("right","right")

////////////////////////////////////////////////////////
// SPARO
////////////////////////////////////////////////////////

const bullets=[]

function shoot(){

const bullet = new THREE.Mesh(

new THREE.SphereGeometry(0.3),

new THREE.MeshBasicMaterial({color:0xffff00})

)

bullet.position.copy(player.position)

bullet.velocity=new THREE.Vector3(0,0,-1)

bullets.push(bullet)

scene.add(bullet)

}

document.getElementById("shoot").addEventListener("click",shoot)
document.getElementById("jump").addEventListener("click",jump)

////////////////////////////////////////////////////////
// BOT
////////////////////////////////////////////////////////

const bots=[]

function spawnBot(){

const bot = new THREE.Mesh(

new THREE.BoxGeometry(2,4,2),

new THREE.MeshLambertMaterial({color:0xff0000})

)

bot.position.set(

Math.random()*100-50,
2,
Math.random()*100-50

)

bots.push(bot)

scene.add(bot)

}

for(let i=0;i<8;i++) spawnBot()

////////////////////////////////////////////////////////
// STORM
////////////////////////////////////////////////////////

let stormRadius=200

function updateStorm(){

stormRadius-=0.02

document.getElementById("storm").innerText="Storm:"+Math.floor(stormRadius)

const dist=Math.sqrt(

player.position.x*player.position.x+
player.position.z*player.position.z

)

if(dist>stormRadius){

playerHP-=0.1

}

}

////////////////////////////////////////////////////////
// STATS
////////////////////////////////////////////////////////

let playerHP=100

////////////////////////////////////////////////////////
// LOOP
////////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate)

if(move.up) player.position.z-=0.3
if(move.down) player.position.z+=0.3
if(move.left) player.position.x-=0.3
if(move.right) player.position.x+=0.3

velocityY-=0.01

player.position.y+=velocityY

if(player.position.y<=2){

player.position.y=2
velocityY=0
onGround=true

}

bullets.forEach(b=>{
b.position.add(b.velocity)
})

bots.forEach(bot=>{

const dir=new THREE.Vector3()

dir.subVectors(player.position,bot.position)

const dist=dir.length()

dir.normalize()

bot.position.add(dir.multiplyScalar(0.03))

if(dist<8){

playerHP-=0.03

}

})

updateStorm()

camera.position.x=player.position.x
camera.position.z=player.position.z+10

camera.lookAt(player.position)

renderer.render(scene,camera)

}

animate()

////////////////////////////////////////////////////////
// FULLSCREEN
////////////////////////////////////////////////////////

document.body.addEventListener("click",()=>{

if(!document.fullscreenElement){

document.body.requestFullscreen()

}

})

////////////////////////////////////////////////////////
// RESIZE
////////////////////////////////////////////////////////

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
